version: '3.8'
services:
  core_web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - 8080:8080
    environment:
    - APP_ENV=production
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/
      interval: 30s
      timeout: 10s
      retries: 3
    restart: always
    networks:
    - nick-net
networks:
  nick-net:
    external: true
